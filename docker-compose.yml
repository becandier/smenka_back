services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smenka
      POSTGRES_PASSWORD: smenka
      POSTGRES_DB: smenka
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smenka"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      target: app
    command: >
      sh -c "alembic -c src/alembic.ini upgrade head &&
             uvicorn src.app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    volumes:
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
